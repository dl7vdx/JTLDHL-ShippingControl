{% extends "base.html" %}
{% block title %}Anmelden – ShippingTracker{% endblock %}

{% block content %}
<div style="max-width:360px; margin: 80px auto;">
    <div style="text-align:center; margin-bottom:32px;">
        <div style="font-size:40px;">📦</div>
        <h1 style="font-size:22px; font-weight:700; margin-top:8px;">ShippingTracker</h1>
        <p style="color:#888; font-size:13px; margin-top:4px;">JTL · DHL Sendungsverfolgung</p>
    </div>

    <div class="card">
        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label>Benutzername</label>
                <input type="text" name="username" autofocus autocomplete="username">
            </div>
            <div class="form-group">
                <label>Passwort</label>
                <input type="password" name="password" autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; margin-top:8px;">
                Anmelden
            </button>
        </form>
    </div>
</div>
{% endblock %}
